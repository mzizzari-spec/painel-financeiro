name: Coleta e envio · Painel Macro

on:
  schedule:
    # 10:00 UTC = 07:00 no horário de Brasília (dias úteis).
    # Obs.: o agendador do GitHub pode atrasar alguns minutos em horários de pico.
    - cron: "0 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Coletar dados do Bacen
        run: python scripts/fetch_data.py

      - name: Commit e push (se houver mudança)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/painel.json
          if git diff --staged --quiet; then
            echo "Sem mudanças nos dados."
          else
            git commit -m "chore: atualiza dados do painel ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Empacotar painel.json para o job de e-mail
        uses: actions/upload-artifact@v4
        with:
          name: painel-json
          path: data/painel.json
          retention-days: 1

  enviar-email:
    runs-on: ubuntu-latest
    needs: coletar          # só roda se a coleta terminou com sucesso
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Baixar painel.json atualizado da etapa anterior
        uses: actions/download-artifact@v4
        with:
          name: painel-json
          path: data

      - name: Enviar e-mail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DESTINATARIOS: ${{ secrets.EMAIL_DESTINATARIOS }}
          PAINEL_URL: "https://mzizzari-spec.github.io/painel-financeiro/"
        run: python scripts/enviar_email.py
