name: Atualizar dados do painel

on:
  schedule:
    # Dias úteis, 11:00 UTC (~08:00 no horário de Brasília).
    # Cobre câmbio/juros diários e capta IPCA/IGP-M e Focus quando saem.
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}   # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Coletar dados do Bacen
        run: python scripts/fetch_data.py

      - name: Commit e push (se houver mudança)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/painel.json
          if git diff --staged --quiet; then
            echo "Sem mudanças nos dados."
          else
            git commit -m "chore: atualiza dados do painel ($(date -u +%Y-%m-%d))"
            git push
          fi
